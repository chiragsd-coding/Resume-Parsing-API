version: '3.9'

# BARE MINIMUM: API + PostgreSQL only
# Total resource usage: 0.5 CPU, 512MB RAM
# Perfect for MVP when starting revenue

services:
  # FastAPI Backend - Takes ~0.2 CPU + 150MB RAM
  api:
    build:
      context: .
      dockerfile: Dockerfile.minimal
    container_name: ats_api
    ports:
      - "8000:8000"
    environment:
      # Database configuration
      DATABASE_URL=postgresql://ats_user:ats_password@postgres:5432/ats_db
      SQLALCHEMY_ECHO=false
      
      # App config
      ENVIRONMENT=production
      DEBUG=false
      WORKERS=1
      
      # Disable everything except basic features
      ENABLE_OLLAMA=false
      ENABLE_REDIS=false
      ENABLE_ELASTICSEARCH=false
      ENABLE_QDRANT=false
      ENABLE_MONITORING=false
      
      # Auth (minimal)
      SECRET_KEY=change-this-in-production
      ALGORITHM=HS256
      ACCESS_TOKEN_EXPIRE_MINUTES=30
    
    depends_on:
      postgres:
        condition: service_healthy
    
    volumes:
      - ./uploads:/app/uploads
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s
    
    restart: unless-stopped
    
    # Resource limits: 0.3 CPU + 200MB RAM (leaves 0.2 CPU + 300MB for postgres)
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 200M
        reservations:
          cpus: '0.15'
          memory: 100M
    
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # PostgreSQL Database - Takes ~0.2 CPU + 300MB RAM
  postgres:
    image: postgres:16-alpine
    container_name: ats_postgres
    
    environment:
      POSTGRES_USER: ats_user
      POSTGRES_PASSWORD: ats_password
      POSTGRES_DB: ats_db
      POSTGRES_INITDB_ARGS: "-c max_connections=20 -c shared_buffers=64MB"
    
    ports:
      - "5432:5432"
    
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ats_user -d ats_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    
    restart: unless-stopped
    
    # Resource limits: 0.2 CPU + 300MB RAM
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 300M
        reservations:
          cpus: '0.1'
          memory: 150M
    
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  postgres_data:
    driver: local

# Total resource allocation:
# API:        0.3 CPU + 200MB RAM
# PostgreSQL: 0.2 CPU + 300MB RAM
# ─────────────────────────────
# Total:      0.5 CPU + 500MB RAM ✅ WITHIN LIMITS!
