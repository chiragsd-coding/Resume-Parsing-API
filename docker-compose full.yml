version: '3.9'

services:
  # API Service
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ats_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://ats_user:ats_password@postgres:5432/ats_db
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - OLLAMA_BASE_URL=http://ollama:11434
      - DEBUG=False
    depends_on:
      - postgres
      - redis
      - qdrant
      - elasticsearch
      - ollama
    networks:
      - ats_network
    volumes:
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: ats_postgres
    environment:
      - POSTGRES_USER=ats_user
      - POSTGRES_PASSWORD=ats_password
      - POSTGRES_DB=ats_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ats_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ats_user -d ats_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ats_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ats_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:v1.7.0
    container_name: ats_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - ats_network
    environment:
      - QDRANT_API_KEY=qdrant_api_key

  # Elasticsearch
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: ats_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - ats_network

  # Ollama LLM Service
  ollama:
    image: ollama/ollama:latest
    container_name: ats_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - ats_network

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: ats_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - ats_network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: ats_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - ats_network
    depends_on:
      - prometheus

  # Loki Logging
  loki:
    image: grafana/loki:latest
    container_name: ats_loki
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    networks:
      - ats_network
    command: -config.file=/etc/loki/local-config.yaml

  # RabbitMQ Message Queue
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: ats_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=user
      - RABBITMQ_DEFAULT_PASS=password
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - ats_network

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  elasticsearch_data:
  ollama_data:
  prometheus_data:
  grafana_data:
  loki_data:
  rabbitmq_data:

networks:
  ats_network:
    driver: bridge
