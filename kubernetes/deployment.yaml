apiVersion: apps/v1
kind: Deployment
metadata:
  name: ats-api
  namespace: default
  labels:
    app: ats-api
    version: v1
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: ats-api
  template:
    metadata:
      labels:
        app: ats-api
    spec:
      containers:
      - name: ats-api
        image: ats-platform/api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: ats-secrets
              key: database_url
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: ats-config
              key: redis_url
        - name: QDRANT_URL
          valueFrom:
            configMapKeyRef:
              name: ats-config
              key: qdrant_url
        - name: OLLAMA_BASE_URL
          valueFrom:
            configMapKeyRef:
              name: ats-config
              key: ollama_url
        - name: ENVIRONMENT
          value: "production"
        - name: DEBUG
          value: "false"
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
        volumeMounts:
        - name: uploads
          mountPath: /app/uploads
      volumes:
      - name: uploads
        persistentVolumeClaim:
          claimName: ats-uploads-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: ats-api-service
  labels:
    app: ats-api
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: ats-api

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ats-api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ats-api
  minReplicas: 3
  maxReplicas: 100
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ats-uploads-pvc
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 500Gi
  storageClassName: fast-ssd

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ats-config
data:
  redis_url: "redis://redis-service:6379/0"
  qdrant_url: "http://qdrant-service:6333"
  ollama_url: "http://ollama-service:11434"
  elasticsearch_hosts: "http://elasticsearch-service:9200"

---
apiVersion: v1
kind: Secret
metadata:
  name: ats-secrets
type: Opaque
stringData:
  database_url: "postgresql://ats_user:ats_password@postgres-service:5432/ats_db"
  stripe_secret_key: "sk_test_xxxxx"
  secret_key: "your-super-secret-key-change-in-production"
